server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:mysql://{ 数据库IP:3306/库名 }?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&zeroDateTimeBehavior=convertToNull
    username: { 数据库用户名 }
    password: { 数据库密码 }
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000git branch --show-current
      pool-name: blog-HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  redis:
    host: { redis地址 }
    port: 6379
    password: { redis密码 }
    database: 0

minio:
  endpoint: { MinIO服务访问地址 }
  accessKey: { MinIO账号 }
  secretKey: { MinIO密钥 }
  bucketName: { 存储桶名称 }

jwt:
  issuer: { 签名 }
  secret: { 密钥 }
