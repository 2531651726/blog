# P6Spy core modules (requires P6Spy 3.2.1+)
modulelist=com.baomidou.mybatisplus.extension.p6spy.MybatisPlusLogFactory,com.p6spy.engine.outage.P6OutageFactory

# Log message format (MyBatis-Plus custom logger)
logMessageFormat=com.baomidou.mybatisplus.extension.p6spy.P6SpyLogger

# Log appender (output to console)
appender=com.baomidou.mybatisplus.extension.p6spy.StdoutLogger

# Uncomment below to use Slf4J instead of console output
#appender=com.p6spy.engine.spy.appender.Slf4JLogger

# Deregister the p6spy driver after usage
deregisterdrivers=true

# Add prefix to JDBC URL
useprefix=true

# Excluded log categories, available values: error,info,batch,debug,statement,commit,rollback,result,resultset.
excludecategories=info,debug,result,commit,resultset

# Date format for log timestamps
dateformat=yyyy-MM-dd HH:mm:ss

# Custom driver list (usually no need to configure)
#driverlist=org.h2.Driver

# Enable slow SQL detection
outagedetection=true

# Slow SQL threshold in seconds
outagedetectioninterval=2